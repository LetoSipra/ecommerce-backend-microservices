services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80" # Expose NGINX on port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - user-service
    networks:
      - ecommerce-net

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce_user
      JWT_SECRET: supersecretkey
    ports:
      - "3001:3001"
    networks:
      - ecommerce-net
    restart: always
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3

  # product-catalog-service:
  #   build: ./services/product-catalog-service
  #   environment:
  #     DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce_product
  #   ports:
  #     - "3002:3002"
  #   networks:
  #     - ecommerce-net
  #   restart: always

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_user # default, but we create more below
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge

volumes:
  pgdata:
